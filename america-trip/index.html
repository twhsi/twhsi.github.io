<head>

  <style>
    :root {
      --bg: #0b1220;
      --surface: #111a2a;
      --surface-soft: #162136;
      --panel: #0f1726;
      --line: #253655;
      --line-strong: #3f5a85;
      --text: #eaf0fb;
      --muted: #9fb1cf;
      --accent: #7ec7ff;
      --accent-soft: rgba(126, 199, 255, 0.18);
      --accent-2: #8be6c0;
      --warn: #ffd390;
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 12px;
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      --content-max: 1400px;
      --grid-max: 760px;
      --transition: 0.15s ease;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background:
        radial-gradient(1200px 700px at 75% -15%, rgba(126, 199, 255, 0.18), transparent 55%),
        radial-gradient(900px 520px at 8% 110%, rgba(139, 230, 192, 0.15), transparent 55%),
        var(--bg);
    }

    .app {
      min-height: 100dvh;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(320px, 40%) 1fr;
      gap: 16px;
      align-items: start;
    }

    .left,
    .right {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(17, 26, 42, 0.95), rgba(15, 23, 38, 0.86));
      box-shadow: var(--shadow);
    }

    .left {
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      height: calc(100dvh - 36px);
      position: sticky;
      top: 18px;
      overflow: hidden;
      align-self: start;
    }

    .right {
      padding: 20px;
      min-height: calc(100dvh - 36px);
      overflow: visible;
      align-self: start;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .badge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(36, 52, 80, 0.95), rgba(23, 35, 56, 0.95));
      border: 1px solid var(--line-strong);
      font-weight: 700;
      font-size: 18px;
    }

      font-size: 16px;
      letter-spacing: 0.3px;
    }

    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .grid-wrap {
      width: min(100%, var(--grid-max), calc(100dvh - 240px));
      margin: 0 auto;
      aspect-ratio: 1 / 1;
      min-height: 0;
      place-self: center;
    }

    .grid {
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .cell {
      min-width: 0;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, rgba(23, 34, 54, 0.95), rgba(18, 28, 45, 0.95));

      justify-content: space-between;

      color: var(--text);

      appearance: none;
      -webkit-appearance: none;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    }

      box-shadow: inset 0 0 0 2px var(--accent-soft), 0 0 0 1px rgba(0, 0, 0, 0.1);
      background: linear-gradient(180deg, rgba(31, 48, 74, 0.98), rgba(20, 32, 50, 0.98));

      font-size: 15px;

      background: #0a1322;

    .md blockquote {

      border-left: 3px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(17, 26, 42, 0.75);

      height: auto;
      display: block;

      border: 1px solid var(--line);

    .divider {

      .cell { border-radius: 12px; }
      .cell .k { font-size: 12px; }

  <script>

    const CONTENT_MD = `
<!--section: 1-->
1 | 美國之旅

# 美國之旅行前規劃

這份頁面把 2026 年「美國之旅」的準備內容整理成九宮格。
點左邊任何主題，右邊就顯示對應的詳細筆記。

## 預算、保險、風險備案

- 預算拆分：交通 / 住宿 / 餐飲 / 購物

### 行前最後確認
- 文件齊全

- 航班與住宿皆已二次確認
    `.trim();

    // =========================================================
    // Section parser
    // =========================================================
    function splitBySection(md) {
      const re = /<!--\s*section:\s*([0-9]+(?:\.[0-9]+)*)\s*-->/g;
      const matches = [...md.matchAll(re)];
      const blocks = [];

      for (let i = 0; i < matches.length; i += 1) {
        const section = matches[i][1];
        const start = matches[i].index + matches[i][0].length;
        const end = i + 1 < matches.length ? matches[i + 1].index : md.length;
        const raw = md.slice(start, end).trim();
        blocks.push({ section, raw });
      }

      return blocks;
    }

    function parseNavBlocks(navMd) {
      return splitBySection(navMd).map((block) => {
        const lines = block.raw.split("\n").map((s) => s.trim()).filter(Boolean);
        const head = lines[0] || "";
        const [label, title] = head.split("|").map((s) => (s || "").trim());

        return {
          section: block.section,
          label: label || `S${block.section}`,
          title: title || "",
        };
      });
    }

    function parseContentBlocks(contentMd) {
      const out = {};
      splitBySection(contentMd).forEach((block) => {
        const lines = block.raw.split("\n").map((line) => line.trimEnd());
        const first = lines.find((line) => line.trim().length > 0) || "";

        out[block.section] = {
          section: block.section,
          tag: `section ${block.section}`,
          title: first.includes("|") ? first : `section ${block.section}`,
          md: block.raw,
        };
      });
      return out;
    }

    // =========================================================
    // Mini markdown renderer
    // =========================================================
    function mdToHtml(md) {
      const escapeHtml = (s) => s
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");

      const lines = md.replaceAll("\r\n", "\n").split("\n");
      let html = "";
      let inUl = false;
      let inQuote = false;

      const closeUl = () => {
        if (inUl) {
          html += "</ul>";
          inUl = false;
        }
      };

      const closeQuote = () => {
        if (inQuote) {
          html += "</blockquote>";
          inQuote = false;
        }
      };

      for (const raw of lines) {
        const line = raw.trimEnd();
        const t = line.trim();

        if (!t) {
          closeUl();
          closeQuote();
          html += "<div style='height:10px'></div>";
          continue;
        }

        if (t === "---") {
          closeUl();
          closeQuote();
          html += "<div class='divider'></div>";
          continue;
        }

        if (t.startsWith(">")) {
          closeUl();
          if (!inQuote) {
            html += "<blockquote>";
            inQuote = true;
          }
          html += `<div>${escapeHtml(t.replace(/^>\s?/, ""))}</div>`;
          continue;
        }
        closeQuote();

        if (t.startsWith("# ")) {
          closeUl();
          html += `<div style="font-size:30px;font-weight:800;line-height:1.2;margin:8px 0 10px">${escapeHtml(t.slice(2))}</div>`;
          continue;
        }

        if (t.startsWith("## ")) {
          closeUl();
          html += `<h3>${escapeHtml(t.slice(3))}</h3>`;
          continue;
        }

        if (t.startsWith("### ")) {
          closeUl();
          html += `<h4>${escapeHtml(t.slice(4))}</h4>`;
          continue;
        }

        if (t.startsWith("- ")) {
          if (!inUl) {
            html += "<ul>";
            inUl = true;
          }
          html += `<li>${escapeHtml(t.slice(2))}</li>`;
          continue;
        }
        closeUl();

        if (/^Step\s+\d+\./i.test(t)) {
          html += `<div><strong style="color:var(--warn)">${escapeHtml(t)}</strong></div>`;
          continue;
        }

        const imageMatch = t.match(/^!\[([^\]]*)\]\(([^)]+)\)$/);
        if (imageMatch) {
          closeUl();
          const alt = escapeHtml(imageMatch[1] || "");
          const src = imageMatch[2].trim();
          html += `<figure class="md-image"><img src="${src}" alt="${alt}" loading="lazy" /></figure>`;
          continue;
        }

        const p = escapeHtml(line)
          .replaceAll(/`([^`]+)`/g, "<code>$1</code>")
          .replaceAll(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
          .replace(/  $/, "<br>");

        html += `<div>${p}</div>`;
      }

      closeUl();
      closeQuote();
      return html;
    }

    // =========================================================
    // UI controller
    // =========================================================
    function sortNavToMandala(navItems) {
      const rank = (section) => {
        if (section === "1") return 5;
        const match = section.match(/^1\.(\d)$/);
        if (!match) return 999;

        const n = Number.parseInt(match[1], 10);
        const map = { 1: 1, 2: 2, 3: 3, 4: 4, 5: 6, 6: 7, 7: 8, 8: 9 };
        return map[n] ?? 999;
      };

      return [...navItems].sort((a, b) => rank(a.section) - rank(b.section));
    }

    const NAV = sortNavToMandala(parseNavBlocks(NAV_MD));
    const CONTENT = parseContentBlocks(CONTENT_MD);

    const gridEl = document.getElementById("grid");
    const panelTitle = document.getElementById("panelTitle");
    const panelTag = document.getElementById("panelTag");
    const panelBody = document.getElementById("panelBody");
    const rightPane = document.getElementById("rightPane");

    function setActiveSection(section) {
      document.querySelectorAll(".cell").forEach((el) => {
        el.classList.toggle("active", el.dataset.section === section);
      });

      const item = CONTENT[section];
      if (!item) {
        panelTitle.textContent = "找不到內容";
        panelTag.textContent = "";
        panelBody.innerHTML = `<div class='muted-line'>CONTENT_MD 找不到 section ${section}</div>`;
        return;
      }

      panelTitle.textContent = item.title;
      panelTag.textContent = item.tag;
      panelBody.innerHTML = mdToHtml(item.md);

      rightPane.scrollTo({ top: 0, behavior: "smooth" });
      history.replaceState(null, "", `#${section}`);
    }

    function renderNavGrid() {
      gridEl.innerHTML = "";

      NAV.forEach((nav) => {
        const cell = document.createElement("button");
        cell.type = "button";
        cell.className = `cell${nav.section === "1" ? " center" : ""}`;
        cell.dataset.section = nav.section;
        cell.innerHTML = `
          <span class="k">${nav.label}</span>
          <span class="t">${nav.title}</span>
        `;

        cell.addEventListener("click", () => setActiveSection(nav.section));
        gridEl.appendChild(cell);
      });
    }

    renderNavGrid();

    const fromHash = location.hash ? decodeURIComponent(location.hash.slice(1)) : "";
    if (fromHash && CONTENT[fromHash]) {
      setActiveSection(fromHash);
    } else {
      setActiveSection("1");
    }
  </script>
