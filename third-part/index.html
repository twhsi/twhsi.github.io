<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>第三部 九宮與 Graph View</title>
    <link rel="stylesheet" href="./styles.css?v=20260313d" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="panel-header">
          <div>
            <div id="site-eyebrow" class="eyebrow">Vault</div>
            <h1 id="site-title">Loading vault...</h1>
          </div>
          <button id="sidebar-close" class="sidebar-btn sidebar-close" type="button" aria-label="Close sidebar">✕</button>
          <input id="search-input" type="search" placeholder="Search notes" />
        </div>
        <nav id="file-tree" class="tree"></nav>
      </aside>
      <button id="sidebar-backdrop" class="sidebar-backdrop" type="button" aria-label="Close sidebar"></button>

      <main class="content">
        <header class="note-header">
          <button id="sidebar-toggle" class="sidebar-btn sidebar-toggle" type="button" aria-label="Open sidebar">☰</button>
          <button id="mobile-markdown-toggle" class="sidebar-btn mobile-view-btn" type="button" aria-label="Switch to markdown">M</button>
          <div class="note-title-wrap">
            <div id="reader-eyebrow" class="eyebrow">Publish-style Reader</div>
            <h2 id="note-title">Loading...</h2>
          </div>
          <button id="mobile-mandala-toggle" class="sidebar-btn mobile-view-btn" type="button" aria-label="Switch to mandala">9</button>
          <div id="note-meta" class="note-meta"></div>
        </header>
        <section id="landing-panel" class="landing-panel" hidden></section>
        <section id="mandala-shell" class="mandala-shell" hidden></section>
        <article id="note-body" class="markdown-body"></article>
      </main>

      <aside class="inspector">
        <section class="navigator-panel">
          <div class="panel-header compact">
            <div>
              <div class="eyebrow">Index</div>
              <h3>Keyword Navigator</h3>
            </div>
          </div>
          <div id="keyword-nav" class="keyword-nav"></div>
        </section>

        <section class="graph-panel">
          <div class="panel-header compact">
            <div>
              <div class="eyebrow">Graph</div>
              <h3>Local Graph View</h3>
            </div>
          </div>
          <div id="graph-root" class="graph-root"></div>
          <div id="graph-legend" class="graph-legend"></div>
        </section>

        <section class="links-panel">
          <div class="panel-header compact">
            <div>
              <div class="eyebrow">Links</div>
              <h3>Backlinks</h3>
            </div>
          </div>
          <div id="backlinks" class="backlinks"></div>
        </section>
      </aside>
    </div>

    <script type="module" src="./app.js?v=20260313d"></script>
  </body>
</html>
