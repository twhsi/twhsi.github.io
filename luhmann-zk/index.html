<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>魯曼卡片盒｜雙向連結</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <aside class="left-rail">
        <div class="rail-inner">
          <p class="rail-label">charpter3</p>
          <h1 id="site-title" class="vault-title">魯曼卡片盒｜雙向連結</h1>
          <p class="vault-note">Obsidian Publish 風格閱讀頁</p>
          <nav id="library-nav" class="library-nav" aria-label="筆記導覽"></nav>
        </div>
      </aside>

      <main class="main-panel">
        <header class="article-hero">
          <div class="hero-meta">
            <p class="hero-path">+ 00 永久筆記 / 魯曼卡片盒一撇</p>
          </div>
          <h2 id="article-title" class="article-title">魯曼卡片盒導覽</h2>
        </header>

        <section class="board-panel">
          <div class="board-panel-head">
            <p class="section-kicker">Board</p>
          </div>
          <div id="view-modes" class="view-modes" aria-label="視圖切換"></div>
          <div id="board-tabs" class="board-tabs" aria-label="九宮切換"></div>
          <div id="mandala-grid" class="mandala-grid" aria-live="polite"></div>
        </section>

        <article id="article-shell" class="article-card">
          <div id="article-content" class="md"></div>
        </article>
      </main>

      <aside class="right-rail">
        <div class="rail-inner right-inner">
          <section class="side-section">
            <p class="section-kicker">Local Graph</p>
            <h2 id="graph-title" class="side-title">關係圖</h2>
            <div id="graph-focus" class="graph-focus"></div>
          </section>

          <section class="side-section">
            <p class="section-kicker">Related</p>
            <h2 class="side-title">相鄰節點</h2>
            <label class="search-box">
              <span class="sr-only">搜尋關鍵字</span>
              <input id="keyword-search" type="search" placeholder="搜尋關鍵字或章節" />
            </label>
            <div id="keyword-chips" class="keyword-chips"></div>
            <div id="keyword-results" class="keyword-results"></div>
          </section>
        </div>
      </aside>
    </div>

    <script src="./site-data.js"></script>
    <script src="./app.js"></script>
